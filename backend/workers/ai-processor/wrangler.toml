name = "resurface-ai"
main = "src/index.ts"
compatibility_date = "2024-01-01"

[vars]
ENVIRONMENT = "production"

# Secrets (set via: wrangler secret put CLAUDE_API_KEY)
# CLAUDE_API_KEY - Your Anthropic API key
# APP_SECRET - Secret for iOS app authentication (optional)

# Rate limiting
# [unsafe.bindings]
# [[unsafe.bindings]]
