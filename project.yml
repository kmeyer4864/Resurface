name: Resurface
options:
  bundleIdPrefix: com.resurface
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"

targets:
  Resurface:
    type: application
    platform: iOS
    sources:
      - path: Resurface
        excludes:
          - "**/.DS_Store"
      - path: Shared
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.keenanmeyer.resurface
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_GENERATION_MODE: GeneratedFile
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_ENTITLEMENTS: Resurface/Resurface.entitlements
    entitlements:
      path: Resurface/Resurface.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.keenanmeyer.resurface
    dependencies:
      - target: ShareExtension
        embed: true

  ShareExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: ShareExtension
        excludes:
          - "**/.DS_Store"
          - "**/Base.lproj"
      - path: Shared
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.keenanmeyer.resurface.ShareExtension
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_FILE: ShareExtension/Info.plist
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_ENTITLEMENTS: ShareExtension/ShareExtension.entitlements
        SKIP_INSTALL: YES
    entitlements:
      path: ShareExtension/ShareExtension.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.keenanmeyer.resurface

  ResurfaceTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ResurfaceTests
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: Resurface

  ResurfaceUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: ResurfaceUITests
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: Resurface

schemes:
  Resurface:
    build:
      targets:
        Resurface: all
        ResurfaceTests: [test]
        ResurfaceUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - ResurfaceTests
        - ResurfaceUITests
